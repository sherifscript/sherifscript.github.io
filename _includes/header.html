<header class="site-header glass-header" role="banner">
  {%- assign show_scroll = true -%}
  {%- if page.url contains 'about' or page.url == '/' or page.url == '/index.html' -%}
    {%- assign show_scroll = false -%}
  {%- endif -%}
  {%- if show_scroll -%}
  <div class="scroll-progress-container">
    <div class="scroll-progress-bar" id="myBar"></div>
  </div>
  {%- endif -%}
  <div class="wrapper flex-between">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
      <span class="logo-text">AhmedSherif <span class="text-gradient">/ Playground</span></span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <div class="trigger">
        <a class="page-link" href="{{ '/about' | relative_url }}">About</a>
      </div>
    </nav>
  </div>
</header>
