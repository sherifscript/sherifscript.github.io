<footer class="site-footer">
  <div class="wrapper footer-content flex-between">
    <div class="footer-col" style="flex: 1;">
      <p class="footer-desc">{{ site.description | escape }}</p>
    </div>
    <div class="footer-col social-links" style="display: flex; gap: 1.5rem; justify-content: flex-end;">
      {%- if site.socials.GitHub -%}
      <a href="{{ site.socials.GitHub }}" class="social-icon-btn" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      {%- endif -%}
      {%- if site.socials.Linkedin -%}
      <a href="{{ site.socials.Linkedin }}" class="social-icon-btn" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      {%- endif -%}
    </div>
  </div>
  <div class="wrapper footer-bottom">
    <p>&copy; {{ site.time | date: '%Y' }} Ahmed Sherif. All rights reserved.</p>
  </div>
  
  <!-- Prism.js Syntax Highlighting JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-r.min.js"></script>
</footer>
