<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}{% if page.case_file %} — {{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ '/assets/images/og-image.jpg' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v=3">
<script>
  (function () { try { var s = localStorage.getItem('asherif-tweaks'); var t = s ? JSON.parse(s).theme : null; if (!t) t = matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); } catch (e) { } })();
</script>
